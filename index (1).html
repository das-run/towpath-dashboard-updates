<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOWPATH — Canal Corridor 100 Training Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 16px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }
    .header p {
      color: #718096;
      font-size: 14px;
      line-height: 1.6;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab-btn {
      padding: 12px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #718096;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.active {
      color: #2d3748;
      border-bottom-color: #3182ce;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-top: 20px;
      margin-bottom: 12px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #2d3748;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
    }
    .btn-primary {
      background: #3182ce;
      color: white;
    }
    .btn-success {
      background: #38a169;
      color: white;
    }
    .btn-danger {
      background: #e53e3e;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
      width: auto;
      margin: 0;
    }
    .run-entry {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .run-date {
      font-weight: 600;
      color: #1a202c;
      font-size: 15px;
    }
    .run-stats {
      font-size: 13px;
      color: #718096;
      margin-top: 4px;
    }
    .knee-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
    .knee-green {
      background: #c6f6d5;
      color: #22543d;
    }
    .knee-yellow {
      background: #feebc8;
      color: #7c2d12;
    }
    .knee-red {
      background: #fed7d7;
      color: #742a2a;
    }
    .run-details {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #cbd5e0;
      font-size: 13px;
      color: #4a5568;
      display: none;
    }
    .run-details.show {
      display: block;
    }
    .food-entry {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .daily-totals {
      background: #edf2f7;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.8;
    }
    .day-type-box {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #718096;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TOWPATH</h1>
      <p>Canal Corridor 100</p>
      <p>October 10-11, 2026 • Towpath Trail, Akron, OH</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('today')">Today</button>
        <button class="tab-btn" onclick="showTab('runs')">All Runs</button>
        <button class="tab-btn" onclick="showTab('nutrition')">Nutrition</button>
      </div>

      <!-- TODAY TAB -->
      <div id="today" class="tab-content active">
        <div class="section-title">Today's Runs</div>
        <div id="todayRunsContainer"></div>

        <div class="section-title">Log Run</div>
        <div class="day-type-box">
          <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="runDate" value="">
            </div>
            <div class="form-group">
              <label>Distance (mi)</label>
              <input type="number" step="0.1" id="runDistance" placeholder="3.5">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>RPE (1-10)</label>
              <input type="number" min="1" max="10" id="runRPE" placeholder="5">
            </div>
            <div class="form-group">
              <label>Avg Power (W)</label>
              <input type="number" id="runPower" placeholder="300">
            </div>
          </div>
          <div class="form-group">
            <label>Avg HR (bpm)</label>
            <input type="number" id="runHR" placeholder="130">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Knee Status</label>
              <select id="runKneeStatus">
                <option>Green</option>
                <option>Yellow</option>
                <option>Red</option>
              </select>
            </div>
            <div class="form-group">
              <label>Knee Details</label>
              <input type="text" id="runKneeDetails" placeholder="e.g., Mild">
            </div>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="runNotes" placeholder="How did it feel?" style="resize: vertical; min-height: 60px;"></textarea>
          </div>
          <button class="btn btn-primary" onclick="addRun()">Log Run</button>
        </div>

        <div class="section-title">Today's Nutrition</div>
        <div id="todayNutritionContainer"></div>

        <div class="section-title">Log Food</div>
        <div class="day-type-box">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="foodDate" value="">
          </div>
          <div class="form-group">
            <label>Food Name</label>
            <input type="text" id="foodName" placeholder="e.g., Rice, Chicken">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Calories</label>
              <input type="number" id="foodCal" placeholder="200">
            </div>
            <div class="form-group">
              <label>Protein (g)</label>
              <input type="number" id="foodProtein" placeholder="15">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Carbs (g)</label>
              <input type="number" id="foodCarbs" placeholder="30">
            </div>
            <div class="form-group">
              <label>Fat (g)</label>
              <input type="number" id="foodFat" placeholder="5">
            </div>
          </div>
          <button class="btn btn-success" onclick="addFood()">Log Food</button>
        </div>
      </div>

      <!-- ALL RUNS TAB -->
      <div id="runs" class="tab-content">
        <div id="allRunsContainer"></div>
      </div>

      <!-- NUTRITION TAB -->
      <div id="nutrition" class="tab-content">
        <div id="allNutritionContainer"></div>
      </div>
    </div>

    <div class="footer">
      Data saved to your device • Last updated <span id="lastUpdated"></span>
    </div>
  </div>

  <script>
    // Initialize dates
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('runDate').value = today;
    document.getElementById('foodDate').value = today;

    // Seed data
    const seedRuns = [
      {
        id: 'run_20260615',
        date: '2026-06-15',
        distance: 3.64,
        power: 321,
        hr: 125,
        rpe: 3,
        kneeStatus: 'Green',
        kneeDetails: 'Mild',
        notes: 'Best run since January. PT knee taping helped. Cooler temps. Minimal anterior pressure.'
      }
    ];

    const seedNutrition = [
      { id: 'f1', date: '2026-06-15', food: 'Aldi Protein Wrap', cal: 120, protein: 12, carbs: 17, fat: 3 },
      { id: 'f2', date: '2026-06-15', food: 'Ground sirloin 90/10 (6.5oz)', cal: 1140, protein: 142, carbs: 0, fat: 57 },
      { id: 'f3', date: '2026-06-15', food: '10 smoked wings', cal: 1079, protein: 104, carbs: 0.5, fat: 64.5 }
    ];

    // Load data
    let runs = JSON.parse(localStorage.getItem('towpath_runs')) || seedRuns;
    let nutrition = JSON.parse(localStorage.getItem('towpath_nutrition')) || seedNutrition;

    // Save data
    function saveData() {
      localStorage.setItem('towpath_runs', JSON.stringify(runs));
      localStorage.setItem('towpath_nutrition', JSON.stringify(nutrition));
      document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
    }

    // Add run
    function addRun() {
      const distance = document.getElementById('runDistance').value;
      if (!distance) return;

      const run = {
        id: 'run_' + Date.now(),
        date: document.getElementById('runDate').value,
        distance: parseFloat(distance),
        power: document.getElementById('runPower').value || null,
        hr: document.getElementById('runHR').value || null,
        rpe: document.getElementById('runRPE').value || null,
        kneeStatus: document.getElementById('runKneeStatus').value,
        kneeDetails: document.getElementById('runKneeDetails').value,
        notes: document.getElementById('runNotes').value
      };

      runs.push(run);
      saveData();
      renderAll();

      // Clear form
      document.getElementById('runDistance').value = '';
      document.getElementById('runPower').value = '';
      document.getElementById('runHR').value = '';
      document.getElementById('runRPE').value = '';
      document.getElementById('runKneeDetails').value = '';
      document.getElementById('runNotes').value = '';
    }

    // Add food
    function addFood() {
      const food = document.getElementById('foodName').value;
      const cal = document.getElementById('foodCal').value;
      if (!food || !cal) return;

      const entry = {
        id: 'food_' + Date.now(),
        date: document.getElementById('foodDate').value,
        food: food,
        cal: parseInt(cal),
        protein: parseInt(document.getElementById('foodProtein').value) || 0,
        carbs: parseInt(document.getElementById('foodCarbs').value) || 0,
        fat: parseInt(document.getElementById('foodFat').value) || 0
      };

      nutrition.push(entry);
      saveData();
      renderAll();

      // Clear form
      document.getElementById('foodName').value = '';
      document.getElementById('foodCal').value = '';
      document.getElementById('foodProtein').value = '';
      document.getElementById('foodCarbs').value = '';
      document.getElementById('foodFat').value = '';
    }

    // Render today's runs
    function renderTodayRuns() {
      const todayRuns = runs.filter(r => r.date === today);
      let html = '';
      if (todayRuns.length === 0) {
        html = '<p style="color: #718096; font-size: 14px;">No runs logged for today</p>';
      } else {
        todayRuns.forEach(run => {
          html += `
            <div class="run-entry">
              <div class="run-date">${run.distance} mi • RPE ${run.rpe || '?'}</div>
              <div class="run-stats">${run.hr ? run.hr + ' bpm' : ''} ${run.power ? '• ' + run.power + 'W' : ''}</div>
              <span class="knee-badge knee-${run.kneeStatus.toLowerCase()}">${run.kneeStatus}</span>
            </div>
          `;
        });
      }
      document.getElementById('todayRunsContainer').innerHTML = html;
    }

    // Render today's nutrition
    function renderTodayNutrition() {
      const todayFood = nutrition.filter(f => f.date === today);
      let html = '';
      if (todayFood.length === 0) {
        html = '<p style="color: #718096; font-size: 14px;">No food logged for today</p>';
      } else {
        let totals = { cal: 0, protein: 0, carbs: 0, fat: 0 };
        todayFood.forEach(f => {
          totals.cal += f.cal;
          totals.protein += f.protein;
          totals.carbs += f.carbs;
          totals.fat += f.fat;
        });

        html += '<div class="daily-totals">';
        html += `<strong>Totals:</strong> ${totals.cal} cal | ${totals.protein}g P | ${totals.carbs}g C | ${totals.fat}g F<br>`;
        html += `<strong>Target carbs:</strong> ${totals.carbs}/210g (${Math.round(totals.carbs/210*100)}%)`;
        html += '</div>';

        todayFood.forEach(f => {
          html += `
            <div class="food-entry">
              <span>${f.food}</span>
              <span style="color: #718096; font-size: 12px;">${f.cal}c | ${f.protein}P | ${f.carbs}C | ${f.fat}F</span>
            </div>
          `;
        });
      }
      document.getElementById('todayNutritionContainer').innerHTML = html;
    }

    // Render all runs
    function renderAllRuns() {
      let html = '<div class="section-title">All Runs</div>';
      const sorted = [...runs].sort((a, b) => new Date(b.date) - new Date(a.date));
      sorted.forEach(run => {
        html += `
          <div class="run-entry">
            <div style="cursor: pointer;" onclick="toggleDetails('run_${run.id}')">
              <div class="run-date">${run.date} — ${run.distance} mi</div>
              <div class="run-stats">${run.hr ? run.hr + ' bpm' : ''} ${run.power ? '• ' + run.power + 'W' : ''} ${run.rpe ? '• RPE ' + run.rpe : ''}</div>
            </div>
            <span class="knee-badge knee-${run.kneeStatus.toLowerCase()}">${run.kneeStatus}</span>
            <div id="run_${run.id}" class="run-details">
              ${run.kneeDetails ? '<p><strong>Knee:</strong> ' + run.kneeDetails + '</p>' : ''}
              ${run.notes ? '<p><strong>Notes:</strong> ' + run.notes + '</p>' : ''}
              <button class="btn-danger" onclick="deleteRun('${run.id}')">Delete</button>
            </div>
          </div>
        `;
      });
      document.getElementById('allRunsContainer').innerHTML = html;
    }

    // Render all nutrition
    function renderAllNutrition() {
      let html = '<div class="section-title">Nutrition Log</div>';
      const dates = [...new Set(nutrition.map(f => f.date))].sort().reverse();
      dates.forEach(date => {
        const foods = nutrition.filter(f => f.date === date);
        let totals = { cal: 0, protein: 0, carbs: 0, fat: 0 };
        foods.forEach(f => {
          totals.cal += f.cal;
          totals.protein += f.protein;
          totals.carbs += f.carbs;
          totals.fat += f.fat;
        });

        html += `<div class="day-type-box">`;
        html += `<strong>${date}</strong><br>`;
        foods.forEach(f => {
          html += `<div class="food-entry"><span>${f.food}</span><span style="color: #718096; font-size: 12px;">${f.cal}c | ${f.protein}P | ${f.carbs}C | ${f.fat}F</span></div>`;
        });
        html += `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #cbd5e0; font-weight: 600;">Total: ${totals.cal} cal | ${totals.protein}g P | ${totals.carbs}g C | ${totals.fat}g F</div>`;
        html += `</div>`;
      });
      document.getElementById('allNutritionContainer').innerHTML = html;
    }

    // Render all
    function renderAll() {
      renderTodayRuns();
      renderTodayNutrition();
      renderAllRuns();
      renderAllNutrition();
    }

    // Tab switching
    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // Toggle details
    function toggleDetails(id) {
      const el = document.getElementById(id);
      el.classList.toggle('show');
    }

    // Delete run
    function deleteRun(id) {
      runs = runs.filter(r => r.id !== id);
      saveData();
      renderAll();
    }

    // Initial render
    renderAll();
  </script>
</body>
</html>
