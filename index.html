<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOWPATH — Training Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1e; color: #e8e8f0; padding: 0; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
    .header { background: linear-gradient(135deg, #1a1a30 0%, #2a2a4e 100%); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .header p { font-size: 13px; color: #a89f90; }
    .card { background: #1a1a30; border-radius: 12px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .status { padding: 12px; border-radius: 8px; background: #f59e0b; color: #1a1a30; font-weight: 600; text-align: center; }
    .success { background: #4dd0e1; }
    .error { background: #ff6b6b; }
    .loading { background: #9ab4d1; }
    .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #505070; font-size: 14px; }
    .data-row:last-child { border-bottom: none; }
    .label { color: #a89f90; }
    .value { font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #2a2a4e; padding: 8px; text-align: left; font-weight: 600; border-bottom: 1px solid #505070; }
    td { padding: 8px; border-bottom: 1px solid #505070; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TOWPATH</h1>
      <p>Canal Corridor 100 — Training Dashboard</p>
    </div>

    <div class="card">
      <h2>Connection Status</h2>
      <div id="status" class="status loading">Loading data...</div>
    </div>

    <div class="card">
      <h2>Your Data</h2>
      <div id="data">
        <p style="color: #a89f90; font-size: 13px;">Fetching from Google Sheets...</p>
      </div>
    </div>

    <div class="card">
      <h2>Debug Info</h2>
      <div id="debug" style="font-size: 12px; color: #a89f90; font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1-TTILQvcz-Y00OGQ5NZMqOVMOFCMTVdorPXwaV8a014';
    const SHEET_NAME = 'Sheet1';
    const API_KEY = 'AIzaSyBw9Kv90xPMuNYFx93kTSyFdzsngvdPygY';

    const statusEl = document.getElementById('status');
    const dataEl = document.getElementById('data');
    const debugEl = document.getElementById('debug');

    async function fetchSheetData() {
      try {
        debugEl.textContent += 'Starting fetch...\n';
        
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
        
        debugEl.textContent += `Fetching: ${url}\n\n`;
        
        const response = await fetch(url);
        
        debugEl.textContent += `Response status: ${response.status}\n`;
        
        if (!response.ok) {
          const errorText = await response.text();
          debugEl.textContent += `Error body: ${errorText}\n`;
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        debugEl.textContent += `Data received successfully\n`;
        
        if (data.values && data.values.length > 0) {
          statusEl.textContent = '✓ Connected! Reading your Google Sheet...';
          statusEl.className = 'status success';
          
          let html = '<table><tr>';
          // Header row
          data.values[0].forEach(header => {
            html += `<th>${header}</th>`;
          });
          html += '</tr>';
          
          // Data rows
          for (let i = 1; i < data.values.length; i++) {
            html += '<tr>';
            data.values[i].forEach(cell => {
              html += `<td>${cell || '-'}</td>`;
            });
            html += '</tr>';
          }
          html += '</table>';
          
          dataEl.innerHTML = html;
          debugEl.textContent += `Loaded ${data.values.length} rows\n`;
        } else {
          throw new Error('No data in sheet');
        }
      } catch (error) {
        debugEl.textContent += `\nERROR: ${error.message}\n`;
        statusEl.textContent = `✗ Error: ${error.message}`;
        statusEl.className = 'status error';
        dataEl.innerHTML = `<p style="color: #ff6b6b;">Failed to load data. Check debug info below.</p>`;
      }
    }

    debugEl.textContent = 'TOWPATH — Google Sheets Test\n';
    debugEl.textContent += '=============================\n\n';
    
    fetchSheetData();
  </script>
</body>
</html>
