<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA ALMANAC — Canal Corridor 100</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1e; color: #e8e8f0; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
    .header { background: linear-gradient(135deg, #1a1a30 0%, #2a2a4e 100%); padding: 24px 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #a89f90; }
    .daysOut { display: flex; align-items: baseline; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .daysNum { font-size: 28px; font-weight: 700; color: #f59e0b; }
    .daysSub { font-size: 12px; color: #a89f90; }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #505070; padding: 0 16px; background: #0f0f1e; }
    .tab { padding: 16px 20px; font-size: 14px; font-weight: 600; border: none; background: transparent; color: #a89f90; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #4dd0e1; border-bottom-color: #4dd0e1; }
    .content { padding: 20px 16px; }
    .card { background: #1a1a30; border-radius: 12px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .status-btn { padding: 12px 0; border-radius: 12px; border: 1.5px solid #505070; background: transparent; font-size: 14px; font-weight: 700; cursor: pointer; color: #e8e8f0; width: 100%; margin-top: 4px; }
    .status-btn.active { background: #4dd0e1; color: #1a1a30; border-color: #4dd0e1; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .input-field { padding: 9px 10px; border-radius: 8px; border: 1.5px solid #505070; background: #1a1a30; font-size: 14px; color: #e8e8f0; width: 100%; margin-bottom: 10px; font-family: inherit; }
    .input-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #a89f90; font-weight: 600; margin-bottom: 6px; display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .btn-primary { width: 100%; padding: 12px 0; border: none; border-radius: 12px; background: #4dd0e1; color: #1a1a30; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .loading { color: #a89f90; font-size: 13px; text-align: center; padding: 20px; }
    .error { color: #ff6b6b; font-size: 13px; padding: 12px; background: rgba(255,107,107,0.1); border-radius: 8px; margin-bottom: 12px; }
    .success { color: #4dd0e1; font-size: 13px; padding: 12px; background: rgba(77,208,225,0.1); border-radius: 8px; margin-bottom: 12px; }
    .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #505070; font-size: 13px; }
    .data-row:last-child { border-bottom: none; }
    .label { color: #a89f90; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ULTRA ALMANAC</h1>
      <p>Canal Corridor 100</p>
      <div class="daysOut">
        <div class="daysNum" id="daysOut">116</div>
        <div class="daysSub">DAYS OUT</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('today')">Today</button>
      <button class="tab" onclick="switchTab('schedule')">Schedule</button>
      <button class="tab" onclick="switchTab('fuel')">Fuel</button>
      <button class="tab" onclick="switchTab('progress')">Progress</button>
    </div>

    <div class="content">
      <div id="message"></div>

      <!-- TODAY TAB -->
      <div id="today-tab">
        <div class="card">
          <div class="card-title">Today's Workout</div>
          <div id="todayWorkout" style="font-size: 14px; line-height: 1.6; color: #e8e8f0;">Loading...</div>
          <button class="btn-primary" onclick="markWorkoutDone()">✓ Mark Done</button>
        </div>

        <div class="card">
          <div class="card-title">Knee Check-in</div>
          <div class="btn-row">
            <button class="status-btn" id="knee-green" onclick="setKnee('Green')">Green</button>
            <button class="status-btn" id="knee-yellow" onclick="setKnee('Yellow')">Yellow</button>
            <button class="status-btn" id="knee-red" onclick="setKnee('Red')">Red</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Run Check-in</div>
          <div class="form-row">
            <div>
              <label class="input-label">RPE (1-10)</label>
              <input type="number" min="1" max="10" id="rpe" class="input-field" style="margin-bottom: 0;" />
            </div>
            <div>
              <label class="input-label">Avg Power (W)</label>
              <input type="number" id="power" class="input-field" style="margin-bottom: 0;" />
            </div>
          </div>
          <div>
            <label class="input-label">Avg HR (bpm)</label>
            <input type="number" id="hr" class="input-field" />
          </div>
          <label class="input-label">Notes</label>
          <textarea id="notes" class="input-field" style="resize: vertical; min-height: 60px;"></textarea>
          <button class="btn-primary" onclick="logRun()">Log Run</button>
        </div>
      </div>

      <!-- SCHEDULE TAB -->
      <div id="schedule-tab" style="display: none;">
        <div class="card">
          <div class="card-title" style="font-size: 18px; margin-bottom: 16px;">4-Week Rehab Rebuild</div>
          <div id="scheduleContent">Loading...</div>
        </div>
      </div>

      <!-- FUEL TAB -->
      <div id="fuel-tab" style="display: none;">
        <div class="card">
          <div class="card-title">Log Meal</div>
          <div class="form-row">
            <div>
              <label class="input-label">Date</label>
              <input type="date" id="mealDate" class="input-field" style="margin-bottom: 0;" />
            </div>
            <div></div>
          </div>
          <label class="input-label">Food</label>
          <input type="text" id="mealFood" class="input-field" placeholder="e.g., Rice, Chicken" />
          <div class="form-row">
            <div>
              <label class="input-label">Calories</label>
              <input type="number" id="mealCal" class="input-field" style="margin-bottom: 0;" />
            </div>
            <div>
              <label class="input-label">Protein (g)</label>
              <input type="number" id="mealProtein" class="input-field" style="margin-bottom: 0;" />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label class="input-label">Carbs (g)</label>
              <input type="number" id="mealCarbs" class="input-field" style="margin-bottom: 0;" />
            </div>
            <div>
              <label class="input-label">Fat (g)</label>
              <input type="number" id="mealFat" class="input-field" style="margin-bottom: 0;" />
            </div>
          </div>
          <button class="btn-primary" onclick="logMeal()">Log Meal</button>
        </div>

        <div class="card">
          <div class="card-title">Logged Meals</div>
          <div id="mealsList">Loading...</div>
        </div>
      </div>

      <!-- PROGRESS TAB -->
      <div id="progress-tab" style="display: none;">
        <div class="card">
          <div class="card-title">Your Progress</div>
          <div id="progressContent">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xwkibndcfigvqznxetdh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3a2libmRjZmlndnF6bnhldGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTc1NDgsImV4cCI6MjA5NzIzMzU0OH0.-WHfoOCO-_v8Ni6sY1wHRtbnUdaOFajlI2EObfAfn_s";
    const TODAY = "2026-06-16";
    const RACE_DATE = new Date("2026-10-10");

    const messageEl = document.getElementById("message");

    function showMessage(msg, type = "success") {
      messageEl.innerHTML = `<div class="${type}">${msg}</div>`;
      setTimeout(() => { messageEl.innerHTML = ""; }, 3000);
    }

    function daysUntil(date) {
      return Math.max(0, Math.ceil((date - new Date()) / 86400000));
    }

    function switchTab(tab) {
      document.querySelectorAll('[id$="-tab"]').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-tab').style.display = 'block';
      event.target.classList.add('active');
    }

    async function querySupabase(query) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      }).catch(() => null);
      return response;
    }

    async function getWorkouts() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/workouts?order=date.desc`, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });
      return await response.json();
    }

    async function getMeals(date = TODAY) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/meals?date=eq.${date}`, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });
      return await response.json();
    }

    async function logRun() {
      const rpe = document.getElementById("rpe").value;
      const power = document.getElementById("power").value;
      const hr = document.getElementById("hr").value;
      const notes = document.getElementById("notes").value;
      const knee = document.querySelector('.status-btn.active')?.textContent || "Green";

      if (!rpe || !power || !hr) {
        showMessage("Please fill in RPE, Power, and HR", "error");
        return;
      }

      const response = await fetch(`${SUPABASE_URL}/rest/v1/workouts`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          date: TODAY,
          day_of_week: "Tue",
          week: 1,
          type: "easy",
          rpe: parseInt(rpe),
          power: parseInt(power),
          hr: parseInt(hr),
          knee_status: knee,
          notes: notes,
          completed: true
        })
      });

      if (response.ok) {
        showMessage("Run logged!");
        document.getElementById("rpe").value = "";
        document.getElementById("power").value = "";
        document.getElementById("hr").value = "";
        document.getElementById("notes").value = "";
      } else {
        showMessage("Error logging run", "error");
      }
    }

    async function logMeal() {
      const food = document.getElementById("mealFood").value;
      const cal = document.getElementById("mealCal").value;
      const date = document.getElementById("mealDate").value || TODAY;

      if (!food || !cal) {
        showMessage("Please fill in food and calories", "error");
        return;
      }

      const response = await fetch(`${SUPABASE_URL}/rest/v1/meals`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          date: date,
          food: food,
          calories: parseInt(cal),
          protein_g: parseInt(document.getElementById("mealProtein").value) || 0,
          carbs_g: parseInt(document.getElementById("mealCarbs").value) || 0,
          fat_g: parseInt(document.getElementById("mealFat").value) || 0
        })
      });

      if (response.ok) {
        showMessage("Meal logged!");
        loadFuelTab();
        document.getElementById("mealFood").value = "";
        document.getElementById("mealCal").value = "";
        document.getElementById("mealProtein").value = "";
        document.getElementById("mealCarbs").value = "";
        document.getElementById("mealFat").value = "";
      } else {
        showMessage("Error logging meal", "error");
      }
    }

    function setKnee(status) {
      document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('knee-' + status.toLowerCase()).classList.add('active');
    }

    function markWorkoutDone() {
      showMessage("Workout marked done!");
    }

    async function loadTodayTab() {
      const workouts = await getWorkouts();
      const today = workouts.find(w => w.date === TODAY);
      
      if (today) {
        document.getElementById("todayWorkout").innerHTML = `
          <strong>${today.type}</strong><br>
          ${today.workout}<br>
          <span style="color: #a89f90; font-size: 12px;">${today.distance || 0} miles</span>
        `;
      }
    }

    async function loadScheduleTab() {
      const workouts = await getWorkouts();
      let html = '';
      workouts.forEach(w => {
        html += `
          <div style="display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #505070; font-size: 13px;">
            <div style="font-weight: 700; width: 50px;">${w.day_of_week}</div>
            <div style="flex: 1;">
              <strong>${w.type}</strong><br>
              ${w.workout}
            </div>
            <div style="color: #a89f90;">${w.distance || 0} mi</div>
          </div>
        `;
      });
      document.getElementById("scheduleContent").innerHTML = html;
    }

    async function loadFuelTab() {
      const meals = await getMeals();
      let html = '';
      let totals = { cal: 0, protein: 0, carbs: 0, fat: 0 };
      
      meals.forEach(m => {
        totals.cal += m.calories || 0;
        totals.protein += m.protein_g || 0;
        totals.carbs += m.carbs_g || 0;
        totals.fat += m.fat_g || 0;
        html += `
          <div class="data-row">
            <span>${m.food}</span>
            <span>${m.calories}c | ${m.protein_g}P | ${m.carbs_g}C | ${m.fat_g}F</span>
          </div>
        `;
      });
      
      html += `<div class="data-row" style="font-weight: 600; border-top: 1px solid #505070;">
        <span>Total</span>
        <span>${totals.cal}c | ${totals.protein}P | ${totals.carbs}C | ${totals.fat}F</span>
      </div>`;
      
      document.getElementById("mealsList").innerHTML = html;
      document.getElementById("mealDate").value = TODAY;
    }

    async function loadProgressTab() {
      const workouts = await getWorkouts();
      const completed = workouts.filter(w => w.completed).length;
      const total = workouts.length;
      
      document.getElementById("progressContent").innerHTML = `
        <div class="data-row">
          <span class="label">Workouts Completed</span>
          <span>${completed} / ${total}</span>
        </div>
        <div class="data-row">
          <span class="label">Days Until Race</span>
          <span>${daysUntil(RACE_DATE)} days</span>
        </div>
      `;
    }

    // Initialize
    document.getElementById("daysOut").textContent = daysUntil(RACE_DATE);
    loadTodayTab();
    loadScheduleTab();
    loadFuelTab();
    loadProgressTab();
  </script>
</body>
</html>
