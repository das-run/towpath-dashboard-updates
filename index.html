<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA ALMANAC — Canal Corridor 100</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body { font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1e; color: #e8e8f0; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }
    
    /* Header */
    .header { background: linear-gradient(135deg, #1a1a30 0%, #2a2a4e 100%); padding: 24px 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-family: "Space Grotesk", sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #a89f90; }
    .days-out { display: flex; align-items: baseline; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .days-num { font-family: "Space Grotesk", sans-serif; font-size: 28px; font-weight: 700; color: #f59e0b; }
    .days-sub { font-size: 12px; color: #a89f90; }
    
    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #505070; background: #0f0f1e; margin: 0 16px; }
    .tab { padding: 16px 20px; font-size: 14px; font-weight: 600; border: none; background: transparent; color: #a89f90; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #4dd0e1; border-bottom-color: #4dd0e1; }
    
    /* Content */
    .content { padding: 20px 16px; }
    .card { background: #1a1a30; border-radius: 12px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-family: "Space Grotesk", sans-serif; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #e8e8f0; }
    .card-title-tag { font-size: 11px; font-weight: 500; color: #a89f90; background: transparent; }
    
    /* Buttons */
    .btn-primary { width: 100%; padding: 12px 0; border: none; border-radius: 12px; background: #4dd0e1; color: #1a1a30; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .btn-status { flex: 1; padding: 12px 0; border-radius: 12px; border: 1.5px solid #505070; background: transparent; font-size: 14px; font-weight: 700; cursor: pointer; color: #e8e8f0; font-family: inherit; }
    .btn-status.active { background: #4dd0e1; color: #1a1a30; border-color: #4dd0e1; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    
    /* Forms */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #e8e8f0; font-weight: 600; }
    .input-field { padding: 9px 10px; border-radius: 8px; border: 1.5px solid #505070; background: #1a1a30; font-size: 14px; color: #e8e8f0; width: 100%; font-family: inherit; box-sizing: border-box; }
    .textarea-field { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #505070; background: #1a1a30; font-size: 14px; font-family: inherit; box-sizing: border-box; resize: vertical; color: #e8e8f0; min-height: 60px; }
    
    /* Message */
    .message { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .message.success { color: #4dd0e1; background: rgba(77,208,225,0.1); }
    .message.error { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    
    /* Data display */
    .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #505070; font-size: 13px; }
    .data-row:last-child { border-bottom: none; }
    .label { color: #a89f90; }
    .value { font-weight: 600; }
    
    /* Ring display */
    .ring-row { display: flex; justify-content: space-between; gap: 6px; }
    .ring { text-align: center; flex: 1; }
    .ring-pct { font-family: "Space Grotesk", sans-serif; font-size: 14px; font-weight: 700; color: #e8e8f0; }
    .ring-label { font-size: 12px; font-weight: 600; margin-top: 4px; color: #a89f90; }
    
    /* Schedule */
    .sched-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #505070; font-size: 13px; }
    .sched-dow { font-size: 12px; font-weight: 700; width: 30px; color: #e8e8f0; flex-shrink: 0; }
    .sched-work { flex: 1; line-height: 1.4; }
    .sched-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .sched-miles { color: #a89f90; font-size: 12px; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ULTRA ALMANAC</h1>
      <p>Canal Corridor 100</p>
      <div class="days-out">
        <div class="days-num" id="daysOut">116</div>
        <div class="days-sub">DAYS OUT</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('today')">Today</button>
      <button class="tab" onclick="switchTab('schedule')">Schedule</button>
      <button class="tab" onclick="switchTab('fuel')">Fuel</button>
      <button class="tab" onclick="switchTab('progress')">Progress</button>
    </div>

    <div class="content">
      <div id="message"></div>

      <!-- TODAY TAB -->
      <div id="today-tab">
        <div class="card">
          <div class="card-title">Today's Workout</div>
          <div id="todayWorkout" style="font-size: 14px; line-height: 1.6; color: #e8e8f0;">Loading...</div>
          <button class="btn-primary" onclick="markWorkoutDone()">✓ Mark Done</button>
        </div>

        <div class="card">
          <div class="card-title">Knee Check-in</div>
          <div class="btn-row">
            <button class="btn-status" id="knee-green" onclick="setKnee('Green')">Green</button>
            <button class="btn-status" id="knee-yellow" onclick="setKnee('Yellow')">Yellow</button>
            <button class="btn-status" id="knee-red" onclick="setKnee('Red')">Red</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Run Check-in</div>
          <div class="form-row">
            <div class="field">
              <label class="field-label">RPE (1-10)</label>
              <input type="number" min="1" max="10" id="rpe" class="input-field" />
            </div>
            <div class="field">
              <label class="field-label">Avg Power (W)</label>
              <input type="number" id="power" class="input-field" />
            </div>
          </div>
          <div class="field">
            <label class="field-label">Avg HR (bpm)</label>
            <input type="number" id="hr" class="input-field" />
          </div>
          <label class="field-label" style="margin-top: 10px;">Notes</label>
          <textarea id="notes" class="textarea-field"></textarea>
          <button class="btn-primary" onclick="logRun()">Log Run</button>
        </div>
      </div>

      <!-- SCHEDULE TAB -->
      <div id="schedule-tab" class="hidden">
        <div class="card">
          <div class="card-title" style="font-size: 18px;">4-Week Rehab Rebuild</div>
          <p style="font-size: 13px; color: #a89f90; margin: 8px 0 12px;">Long run 7 → 10 mi • 20 → 25 mpw • flat terrain • knee-first</p>
          <div id="scheduleContent">Loading...</div>
        </div>
      </div>

      <!-- FUEL TAB -->
      <div id="fuel-tab" class="hidden">
        <div class="card">
          <div class="card-title">Log Meal</div>
          <div class="form-row">
            <div class="field">
              <label class="field-label">Date</label>
              <input type="date" id="mealDate" class="input-field" />
            </div>
            <div></div>
          </div>
          <div class="field">
            <label class="field-label">Food</label>
            <input type="text" id="mealFood" class="input-field" placeholder="e.g., Rice, Chicken" />
          </div>
          <div class="form-row">
            <div class="field">
              <label class="field-label">Calories</label>
              <input type="number" id="mealCal" class="input-field" />
            </div>
            <div class="field">
              <label class="field-label">Protein (g)</label>
              <input type="number" id="mealProtein" class="input-field" />
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label class="field-label">Carbs (g)</label>
              <input type="number" id="mealCarbs" class="input-field" />
            </div>
            <div class="field">
              <label class="field-label">Fat (g)</label>
              <input type="number" id="mealFat" class="input-field" />
            </div>
          </div>
          <button class="btn-primary" onclick="logMeal()">Log Meal</button>
        </div>

        <div class="card">
          <div class="card-title">Logged Meals Today</div>
          <div id="mealsList" style="font-size: 13px;">No meals logged yet</div>
        </div>
      </div>

      <!-- PROGRESS TAB -->
      <div id="progress-tab" class="hidden">
        <div class="card">
          <div class="card-title" style="font-size: 18px;">Your Progress</div>
          <div id="progressContent" style="margin-top: 12px;">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xwkibndcfigvqznxetdh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3a2libmRjZmlndnF6bnhldGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTc1NDgsImV4cCI6MjA5NzIzMzU0OH0.-WHfoOCO-_v8Ni6sY1wHRtbnUdaOFajlI2EObfAfn_s";
    const TODAY = "2026-06-16";
    const RACE_DATE = new Date("2026-10-10");

    function showMessage(msg, type = "success") {
      const messageEl = document.getElementById("message");
      messageEl.innerHTML = `<div class="message ${type}">${msg}</div>`;
      setTimeout(() => { messageEl.innerHTML = ""; }, 3000);
    }

    function daysUntil(date) {
      return Math.max(0, Math.ceil((date - new Date()) / 86400000));
    }

    function switchTab(tab) {
      document.querySelectorAll('[id$="-tab"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.remove('hidden');
      event.target.classList.add('active');
    }

    async function getWorkouts() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/workouts?order=date.desc`, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
          }
        });
        return await response.json() || [];
      } catch (e) {
        console.error("Error fetching workouts:", e);
        return [];
      }
    }

    async function getMeals(date = TODAY) {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/meals?date=eq.${date}`, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
          }
        });
        return await response.json() || [];
      } catch (e) {
        console.error("Error fetching meals:", e);
        return [];
      }
    }

    async function logRun() {
      const rpe = document.getElementById("rpe").value;
      const power = document.getElementById("power").value;
      const hr = document.getElementById("hr").value;
      const notes = document.getElementById("notes").value;
      const knee = document.querySelector('.btn-status.active')?.textContent || "Green";

      if (!rpe || !power || !hr) {
        showMessage("Please fill in RPE, Power, and HR", "error");
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/workouts`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            date: TODAY,
            day_of_week: "Tue",
            week: 1,
            type: "easy",
            rpe: parseInt(rpe),
            power: parseInt(power),
            hr: parseInt(hr),
            knee_status: knee,
            notes: notes,
            completed: true
          })
        });

        if (response.ok || response.status === 201) {
          showMessage("✓ Run logged!");
          document.getElementById("rpe").value = "";
          document.getElementById("power").value = "";
          document.getElementById("hr").value = "";
          document.getElementById("notes").value = "";
        } else {
          showMessage("Error logging run", "error");
        }
      } catch (e) {
        showMessage("Error: " + e.message, "error");
      }
    }

    async function logMeal() {
      const food = document.getElementById("mealFood").value;
      const cal = document.getElementById("mealCal").value;
      const date = document.getElementById("mealDate").value || TODAY;

      if (!food || !cal) {
        showMessage("Please fill in food and calories", "error");
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/meals`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            date: date,
            food: food,
            calories: parseInt(cal),
            protein_g: parseInt(document.getElementById("mealProtein").value) || 0,
            carbs_g: parseInt(document.getElementById("mealCarbs").value) || 0,
            fat_g: parseInt(document.getElementById("mealFat").value) || 0
          })
        });

        if (response.ok || response.status === 201) {
          showMessage("✓ Meal logged!");
          loadFuelTab();
          document.getElementById("mealFood").value = "";
          document.getElementById("mealCal").value = "";
          document.getElementById("mealProtein").value = "";
          document.getElementById("mealCarbs").value = "";
          document.getElementById("mealFat").value = "";
        } else {
          showMessage("Error logging meal", "error");
        }
      } catch (e) {
        showMessage("Error: " + e.message, "error");
      }
    }

    function setKnee(status) {
      document.querySelectorAll('.btn-status').forEach(btn => btn.classList.remove('active'));
      document.getElementById('knee-' + status.toLowerCase()).classList.add('active');
    }

    function markWorkoutDone() {
      showMessage("✓ Workout marked done!");
    }

    async function loadTodayTab() {
      const workouts = await getWorkouts();
      const today = workouts.find(w => w.date === TODAY);
      
      if (today) {
        document.getElementById("todayWorkout").innerHTML = `
          <strong>${today.type}</strong><br>
          ${today.workout}<br>
          <span style="color: #a89f90; font-size: 12px; margin-top: 8px; display: block;">${today.distance || 0} miles</span>
        `;
      }
    }

    async function loadScheduleTab() {
      const workouts = await getWorkouts();
      let html = '';
      
      workouts.forEach(w => {
        html += `
          <div class="sched-row">
            <div class="sched-dow">${w.day_of_week}</div>
            <div class="sched-work">
              <strong>${w.type}</strong><br>
              ${w.workout}
            </div>
            <div class="sched-right">
              <span class="sched-miles">${w.distance || 0} mi</span>
            </div>
          </div>
        `;
      });
      
      document.getElementById("scheduleContent").innerHTML = html || "No workouts loaded";
    }

    async function loadFuelTab() {
      const meals = await getMeals();
      let html = '';
      let totals = { cal: 0, protein: 0, carbs: 0, fat: 0 };
      
      meals.forEach(m => {
        totals.cal += m.calories || 0;
        totals.protein += m.protein_g || 0;
        totals.carbs += m.carbs_g || 0;
        totals.fat += m.fat_g || 0;
        html += `
          <div class="data-row">
            <span class="label">${m.food}</span>
            <span>${m.calories}c | ${m.protein_g}p | ${m.carbs_g}c | ${m.fat_g}f</span>
          </div>
        `;
      });
      
      if (html) {
        html += `<div class="data-row" style="font-weight: 600; border-top: 1px solid #505070; margin-top: 8px; padding-top: 8px;">
          <span>Total</span>
          <span>${totals.cal}c | ${totals.protein}p | ${totals.carbs}c | ${totals.fat}f</span>
        </div>`;
      }
      
      document.getElementById("mealsList").innerHTML = html || "No meals logged yet";
      document.getElementById("mealDate").value = TODAY;
    }

    async function loadProgressTab() {
      const workouts = await getWorkouts();
      const completed = workouts.filter(w => w.completed).length;
      const total = workouts.length;
      
      document.getElementById("progressContent").innerHTML = `
        <div class="data-row">
          <span class="label">Workouts Completed</span>
          <span>${completed} / ${total}</span>
        </div>
        <div class="data-row">
          <span class="label">Days Until Race</span>
          <span>${daysUntil(RACE_DATE)} days</span>
        </div>
        <div class="data-row">
          <span class="label">Weight Progress</span>
          <span>209.5 → 190 lbs (19.5 lbs to go)</span>
        </div>
      `;
    }

    // Initialize
    document.getElementById("daysOut").textContent = daysUntil(RACE_DATE);
    loadTodayTab();
    loadScheduleTab();
    loadFuelTab();
    loadProgressTab();
  </script>
</body>
</html>
