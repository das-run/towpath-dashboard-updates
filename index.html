<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOWPATH — Training Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1e; color: #e8e8f0; padding: 0; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
    .header { background: linear-gradient(135deg, #1a1a30 0%, #2a2a4e 100%); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .header p { font-size: 13px; color: #a89f90; }
    .card { background: #1a1a30; border-radius: 12px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .status { padding: 12px; border-radius: 8px; background: #f59e0b; color: #1a1a30; font-weight: 600; text-align: center; }
    .success { background: #4dd0e1; }
    .error { background: #ff6b6b; }
    .loading { background: #9ab4d1; }
    .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #505070; font-size: 14px; }
    .data-row:last-child { border-bottom: none; }
    .label { color: #a89f90; }
    .value { font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TOWPATH</h1>
      <p>Test: Can we read from Google Sheets?</p>
    </div>

    <div class="card">
      <h2>Connection Status</h2>
      <div id="status" class="status loading">Checking...</div>
    </div>

    <div class="card">
      <h2>Test Data from Sheet</h2>
      <div id="data">
        <p style="color: #a89f90; font-size: 13px;">Waiting for data...</p>
      </div>
    </div>

    <div class="card">
      <h2>Debug Info</h2>
      <div id="debug" style="font-size: 12px; color: #a89f90; font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1BDp5V8s-r0v1m_0w8r0v8s-r0v1m_0w8r0v1m'; // Test sheet ID (you'll replace this)
    const SHEET_NAME = 'TestData';
    const API_KEY = 'AIzaSyDummyKeyForTesting'; // Dummy key (you'll replace this)

    const statusEl = document.getElementById('status');
    const dataEl = document.getElementById('data');
    const debugEl = document.getElementById('debug');

    async function fetchSheetData() {
      try {
        debugEl.textContent += 'Starting fetch...\n';
        
        // Try to fetch without API key first (public sheet)
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
        
        debugEl.textContent += `URL: ${url}\n`;
        
        const response = await fetch(url);
        
        debugEl.textContent += `Response status: ${response.status}\n`;
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        debugEl.textContent += `Data received: ${JSON.stringify(data, null, 2)}\n`;
        
        if (data.values) {
          statusEl.textContent = '✓ Connected to Google Sheets!';
          statusEl.className = 'status success';
          
          let html = '';
          data.values.forEach((row, idx) => {
            html += `<div class="data-row"><span class="label">Row ${idx + 1}:</span> <span class="value">${row.join(' | ')}</span></div>`;
          });
          dataEl.innerHTML = html;
        } else {
          throw new Error('No data in sheet');
        }
      } catch (error) {
        debugEl.textContent += `Error: ${error.message}\n`;
        statusEl.textContent = `✗ Error: ${error.message}`;
        statusEl.className = 'status error';
        dataEl.innerHTML = `<p style="color: #ff6b6b;">Failed to fetch data. Check the debug info below.</p>`;
      }
    }

    // Start the test
    debugEl.textContent = 'TEST: Google Sheets Integration\n';
    debugEl.textContent += '================================\n';
    debugEl.textContent += 'This page tests if we can read from a Google Sheet.\n\n';
    
    fetchSheetData();
  </script>
</body>
</html>
