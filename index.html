    /* Main content */

    .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .message.success { color: #4dd0e1; background: rgba(77,208,225,0.1); }

    .message.info { color: #f59e0b; background: rgba(245,158,11,0.1); }
    
    /* Stepper (date nav) */
    .stepper { display: flex; gap: 8px; margin-bottom: 16px; }

    .step-date { font-weight: 600; font-size: 14px; }
    .step-wk { font-size: 12px; color: #a89f90; margin-top: 2px; }

    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

    .card-title-tag { font-size: 11px; font-weight: 500; color: #a89f90; background: transparent; }

    .done-btn { border: 1px solid #505070; background: transparent; color: #a89f90; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .done-btn.on { background: #4dd0e1; color: #1a1a30; border-color: #4dd0e1; }
    .btn-primary { width: 100%; padding: 12px 0; border: none; border-radius: 12px; background: #4dd0e1; color: #1a1a30; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
    .btn-secondary { width: 100%; padding: 10px 0; border: 1px solid #505070; background: transparent; color: #4dd0e1; border-radius: 8px; margin-bottom: 16px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .status-btn { padding: 12px 0; border-radius: 12px; border: 1.5px solid #505070; background: transparent; font-size: 14px; font-weight: 700; cursor: pointer; color: #e8e8f0; font-family: inherit; }

    .sched-done { color: #4dd0e1; font-weight: 700; }

      {wk:"1-4",phase:"Rehab Rebuild",vol:"20-25",long:"7-10",focus:"Quad strength, flat-only, knee-first"},
      {wk:"5-8",phase:"Base Building",vol:"28-35",long:"12-16",focus:"Volume + 1 tempo/week if knee solid"},
      {wk:"9-11",phase:"Peak / Race Prep",vol:"40-48",long:"18-22",focus:"Back-to-backs, race-pace practice"},
      {wk:"12-14",phase:"Taper → Race",vol:"32→20",long:"20",focus:"Sharpen, rest, Oct 10"}
    ];

    function daysUntil(date) {
      const now = new Date();
      const target = new Date(date);
      const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
      return Math.max(0, diff);
    }

    function showMessage(text, type = "success") {
      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      msg.textContent = text;
      const area = document.getElementById("message-area");
      area.innerHTML = "";
      area.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
    }

    async function fetchSupabase(table, query = "") {
      const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
      const res = await fetch(url, {
        headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (!res.ok) {
        console.error(`Supabase fetch error: ${res.statusText}`);
        return [];
      }
      return await res.json();
    }

    async function writeToSupabase(table, data) {
      const url = `${SUPABASE_URL}/rest/v1/${table}`;
      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify(data)
      });
      return res.ok;
    }

    // Load all data from Supabase on startup
    async function loadAllData() {
      document.getElementById("syncStatus").textContent = "Syncing...";
      
      // Fetch workouts
      const workouts = await fetchSupabase("workouts");
      workouts.forEach(w => {
        if (!log[w.date]) log[w.date] = {};
        if (!log[w.date].workouts) log[w.date].workouts = [];
        log[w.date].workouts.push(w);
        if (w.knee_status) {
          log[w.date].knee = { status: w.knee_status, details: w.knee_details };
        }
      });

      // Fetch meals
      const meals = await fetchSupabase("meals");
      meals.forEach(m => {
        if (!log[m.date]) log[m.date] = {};
        if (!log[m.date].eaten) log[m.date].eaten = [];
        log[m.date].eaten.push({
          item: m.food,
          cal: m.calories,
          p: m.protein_g,
          c: m.carbs_g,
          f: m.fat_g
        });
      });

      // Fetch weight
      const weight = await fetchSupabase("weight", "?select=*&order=date.desc&limit=1");
      if (weight.length > 0) {
        log[weight[0].date] = log[weight[0].date] || {};
        log[weight[0].date].weight = weight[0].weight_lbs;
      }

      document.getElementById("syncStatus").textContent = "Synced";
      await loadDataForDate(selectedDate);
      updateToday();
    }

    function jumpTo(date) {
      selectedDate = date;
      loadDataForDate(date);
      updateToday();
    }

    async function loadDataForDate(date) {
      selectedDate = date;
      const dow = new Date(date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short" });
      const schedItem = SCHEDULE.find(d => d.date === date);
      const week = schedItem ? schedItem.wk : "—";
      
      document.getElementById("selectedDateDisplay").textContent = new Date(date + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
      document.getElementById("selectedWeekDisplay").textContent = `Week ${week} • ${dow}`;

      // Rebuild jumper
      let jumperHtml = "";
      for (let wk = 1; wk <= 4; wk++) {
        const days = SCHEDULE.filter(d => d.wk === wk);
        let chipHtml = '<div class="jumper-strip">';
        days.forEach(d => {
          chipHtml += `<button class="jumper-chip ${d.date === date ? 'selected' : ''}" onclick="jumpTo('${d.date}')">${d.dow[0]}</button>`;
        });
        chipHtml += '</div>';
        jumperHtml += `<div class="jumper-week"><div class="jumper-week-label">Week ${wk}</div>${chipHtml}</div>`;
      }
      document.getElementById("jumper").innerHTML = jumperHtml;

      // Prescribed workout
      const prescribed = SCHEDULE.find(d => d.date === date);
      if (prescribed) {
        document.getElementById("prescribedWorkout").textContent = prescribed.workout;
        document.getElementById("prescribedMiles").textContent = prescribed.miles > 0 ? `${prescribed.miles} mi` : "Strength / Rest day";
      }

      // Load day's logged data
      const dayLog = log[date] || {};
      
      // Knee status
      if (dayLog.knee) {
        document.querySelector(`.status-btn[data-status="${dayLog.knee.status}"]`)?.classList.add("active");
        document.getElementById("kneeDetails").value = dayLog.knee.details || "";
      } else {
        document.querySelectorAll(".status-btn").forEach(b => b.classList.remove("active"));
        document.getElementById("kneeDetails").value = "";
      }

      // Run data
      if (dayLog.workouts && dayLog.workouts.length > 0) {
        const w = dayLog.workouts[0];
        document.getElementById("rpe").value = w.rpe || "";
        document.getElementById("power").value = w.power || "";
        document.getElementById("hr").value = w.hr || "";
        document.getElementById("distance").value = w.distance || "";
        document.getElementById("runNotes").value = w.notes || "";
        document.getElementById("markDoneBtn").classList.add("on");
        document.getElementById("markDoneBtn").textContent = "✓ Done";
      } else {
        document.getElementById("rpe").value = "";
        document.getElementById("power").value = "";
        document.getElementById("hr").value = "";
        document.getElementById("distance").value = "";
        document.getElementById("runNotes").value = "";
        document.getElementById("markDoneBtn").classList.remove("on");
        document.getElementById("markDoneBtn").textContent = "Mark Done";
      }

      // Meals
      const eaten = dayLog.eaten || [];
      let eatenHtml = "";
      let totals = { cal: 0, p: 0, c: 0, f: 0 };
      eaten.forEach(m => {
        totals.cal += m.cal || 0;
        totals.p += m.p || 0;
        totals.c += m.c || 0;
        totals.f += m.f || 0;
        eatenHtml += `<div class="meal-section">
          <div class="meal-item">${m.item}</div>
          <div class="meal-macros">${m.cal} cal | ${m.p}p | ${m.c}c | ${m.f}f</div>
        </div>`;
      });
      document.getElementById("eatenMeals").innerHTML = eatenHtml || "No meals logged yet";

      if (eaten.length > 0) {
        const target = TARGETS[prescribed?.type] || TARGETS.easy;
        const carbPct = Math.round((totals.c / target.c) * 100);
        const proteinPct = Math.round((totals.p / target.p) * 100);
        const fatPct = Math.round((totals.f / target.f) * 100);
        
        document.getElementById("mealTotals").innerHTML = `
          <strong>Daily Total:</strong> ${totals.cal} cal | ${totals.p}p | ${totals.c}c | ${totals.f}f<br>
          <small style="color: ${carbPct < 80 ? '#ff6b6b' : '#4dd0e1'}">Carbs: ${carbPct}% of ${target.c}g target</small>
        `;

        // Macro rings
        const macroRings = [
          { label: "Carbs", val: totals.c, target: target.c, color: "#4dd0e1" },
          { label: "Protein", val: totals.p, target: target.p, color: "#f59e0b" },
          { label: "Fat", val: totals.f, target: target.f, color: "#ff6b6b" }
        ];
        let ringsHtml = "";
        macroRings.forEach(r => {
          const pct = Math.min(100, Math.round((r.val / r.target) * 100));
          ringsHtml += `<div class="ring">
            <svg class="ring-svg" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="#505070" stroke-width="8"/>
              <circle cx="50" cy="50" r="45" fill="none" stroke="${r.color}" stroke-width="8" stroke-dasharray="${pct * 2.827} 282.7" stroke-linecap="round"/>
            </svg>
            <span class="ring-pct">${pct}%</span>
            <div class="ring-label">${r.label}</div>
            <div class="ring-val">${r.val}g / ${r.target}g</div>
          </div>`;
        });
        document.getElementById("macroRings").innerHTML = ringsHtml;
      } else {
        document.getElementById("mealTotals").innerHTML = "";
        document.getElementById("macroRings").innerHTML = "";
      }

      document.getElementById("mealDate").valueAsDate = new Date(date + "T12:00:00");
    }

    async function logRun() {
      const rpe = parseInt(document.getElementById("rpe").value);
      const power = parseInt(document.getElementById("power").value);
      const hr = parseInt(document.getElementById("hr").value);
      const distance = parseFloat(document.getElementById("distance").value);
      const notes = document.getElementById("runNotes").value;
      const kneeStatus = document.querySelector(".status-btn.active")?.dataset.status;
      const kneeDetails = document.getElementById("kneeDetails").value;

      if (!kneeStatus || !distance) {
        showMessage("Please select knee status and enter distance", "error");
        return;
      }

      const prescribed = SCHEDULE.find(d => d.date === selectedDate);
      const workout = prescribed?.workout || "Unknown";

      const success = await writeToSupabase("workouts", {
        date: selectedDate,
        day_of_week: new Date(selectedDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "short" }),
        week: prescribed?.wk || 0,
        type: prescribed?.type || "easy",
        workout: workout,
        distance: distance,
        rpe: rpe || null,
        power: power || null,
        hr: hr || null,
        knee_status: kneeStatus,
        knee_details: kneeDetails,
        notes: notes,
        completed: true
      });

      if (success) {
        showMessage("✓ Workout logged!");
        await loadAllData();
      } else {
        showMessage("Error logging workout", "error");
      }
    }

    async function logMeal() {
      const food = document.getElementById("mealFood").value;
      const cal = parseInt(document.getElementById("mealCal").value);
      if (!food || !cal) {
        showMessage("Please fill in food and calories", "error");
        return;
      }

      const success = await writeToSupabase("meals", {
        date: document.getElementById("mealDate").value || selectedDate,
        food: food,
        calories: cal,
        protein_g: parseInt(document.getElementById("mealProtein").value) || 0,
        carbs_g: parseInt(document.getElementById("mealCarbs").value) || 0,
        fat_g: parseInt(document.getElementById("mealFat").value) || 0
      });

      if (success) {
        showMessage("✓ Meal logged!");
        document.getElementById("mealFood").value = "";
        document.getElementById("mealCal").value = "";
        document.getElementById("mealProtein").value = "";
        document.getElementById("mealCarbs").value = "";
        document.getElementById("mealFat").value = "";
        await loadAllData();
      } else {
        showMessage("Error saving meal", "error");
      }
    }

    function loadSchedule() {
      let html = "";
      for (let wk = 1; wk <= 4; wk++) {
        const days = SCHEDULE.filter(d => d.wk === wk);
        const weekMiles = days.reduce((a, d) => a + d.miles, 0);
        html += `<div class="card"><div class="card-title" style="font-size: 15px; margin-bottom: 8px;">Week ${wk} <span style="color: #ff6b6b; font-weight: 700; margin-left: 8px;">${weekMiles} mi</span></div>`;
        days.forEach(d => {
          const dayLog = log[d.date] || {};
          const colorMap = { easy: "#4dd0e1", strength: "#f59e0b", long: "#ff6b6b", rest: "#9ab4d1" };
          const isCompleted = dayLog.workouts && dayLog.workouts.length > 0;
          html += `<div class="sched-row" onclick="jumpTo('${d.date}'); document.querySelectorAll('.tab-btn')[0].click();">
            <div class="sched-dow">${d.dow}</div>
            <div class="sched-dot" style="background: ${colorMap[d.type]};"></div>
            <div class="sched-work"><strong>${d.type}</strong><br>${d.workout}</div>
            <div class="sched-right">
              ${isCompleted ? '<span class="sched-done">✓</span>' : ""}
              ${d.miles > 0 ? `<span class="sched-miles">${d.miles} mi</span>` : ""}
              ${dayLog.knee?.status ? `<div class="sched-knee" style="background: ${{ green: "#4dd0e1", yellow: "#f59e0b", red: "#ff6b6b" }[dayLog.knee.status]};"></div>` : ""}
            </div>
          </div>`;
        });
        html += "</div>";
      }
      document.getElementById("scheduleContent").innerHTML = html;
    }

    function loadProgress() {
      const currentWeight = log[selectedDate]?.weight || 209.5;
      const lost = (213 - currentWeight).toFixed(1);
      const remaining = (190 - currentWeight).toFixed(1);
      const progress = ((213 - currentWeight) / (213 - 190)) * 100;

      document.getElementById("currentWeight").textContent = currentWeight;
      document.getElementById("weightLost").textContent = lost;
      document.getElementById("weightRemaining").textContent = remaining;
      document.getElementById("weightBar").style.width = Math.min(100, progress) + "%";

      let html = "";
      for (let wk = 1; wk <= 4; wk++) {
        const planned = SCHEDULE.filter(d => d.wk === wk).reduce((a, d) => a + d.miles, 0);
        const completed = SCHEDULE.filter(d => d.wk === wk).reduce((a, d) => {
          const dayLog = log[d.date] || {};
          return a + (dayLog.workouts && dayLog.workouts.length > 0 ? d.miles : 0);
        }, 0);
        const maxMiles = 25;
        html += `<div class="bar-group">
          <div class="bar-pair">
            <div class="bar" style="background: #4dd0e1; width: 20px; height: ${(planned / maxMiles) * 110}px;"></div>
            <div class="bar" style="background: #9ab4d1; width: 20px; height: ${(completed / maxMiles) * 110}px;"></div>
          </div>
          <div class="bar-label">W${wk}</div>
          <div class="bar-val">${planned}/${completed}</div>
        </div>`;
      }
      document.getElementById("mileageChart").innerHTML = html;

      html = "";
      PHASES.forEach(p => {
        html += `<div class="phase-row">
          <div class="phase-wk">${p.wk}</div>
          <div class="phase-body">
            <div class="phase-name">${p.phase}</div>
            <div class="phase-meta">${p.vol} mpw • long run ${p.long} mi</div>
            <div class="phase-focus">${p.focus}</div>
          </div>
        </div>`;
      });
      document.getElementById("phasesContent").innerHTML = html;
    }

    function updateToday() {
      loadSchedule();
      loadProgress();
    }

    // Tab navigation
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.add("hidden"));
        btn.classList.add("active");
        document.getElementById(tab).classList.remove("hidden");
      });
    });

    // Date navigation
    document.getElementById("prevBtn").addEventListener("click", () => {
      const date = new Date(selectedDate + "T12:00:00");
      date.setDate(date.getDate() - 1);
      jumpTo(date.toISOString().split("T")[0]);
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      const date = new Date(selectedDate + "T12:00:00");
      date.setDate(date.getDate() + 1);
      jumpTo(date.toISOString().split("T")[0]);
    });

    // Knee status selection
    document.querySelectorAll(".status-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".status-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // Buttons
    document.getElementById("logRunBtn").addEventListener("click", logRun);
    document.getElementById("logMealBtn").addEventListener("click", logMeal);

    // Init
    document.getElementById("daysOut").textContent = daysUntil(RACE_DATE);
    
    (async () => {
      await loadAllData();
    })();
  </script>
</body>
</html>
